<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>일본어 한자 공부 · N5 N4 N3</title>
<meta name="description" content="JLPT N5·N4·N3 한자 612자 학습 앱">
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#8b7fc4">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="한자공부">
<style>
  :root{--accent:#8b7fc4;--accent-d:#6b5fae;--line:#e6e3f0;--bg:#f4f4f6;
        --card:#fff;--ink:#222;--muted:#777;--mark:#e9e6f3;--gold:#e8b53d;--ok:#5bbb72;}
  [data-theme="dark"]{--line:#33304a;--bg:#16151f;--card:#201e2d;--ink:#e8e6f0;
        --muted:#9a95b5;--mark:#2e2b42;--accent:#9d92d6;--accent-d:#b3a9e6;}
  *{box-sizing:border-box}
  body{margin:0;font-family:"Apple SD Gothic Neo","Noto Sans KR","Malgun Gothic",sans-serif;
       background:var(--bg);color:var(--ink);line-height:1.6;transition:background .2s,color .2s}
  ruby rt{font-size:.55em;color:var(--muted)}
  .wrap{max-width:780px;margin:0 auto;padding:0 18px 90px}
  header{position:sticky;top:0;z-index:10;background:var(--bg);opacity:.98;
         padding:12px 18px;border-bottom:1px solid var(--line)}
  header .inner{max-width:780px;margin:0 auto;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  h1{font-size:16px;margin:0}
  .tabs{margin-left:auto;display:flex;gap:6px}
  .tab,.ic{border:1px solid var(--line);background:var(--card);color:var(--muted);
       padding:6px 11px;border-radius:20px;font-size:13px;cursor:pointer}
  .tab.active{background:var(--accent);color:#fff;border-color:var(--accent)}
  .ic{padding:6px 10px}
  .filters{display:flex;gap:6px;margin:14px 0 0;flex-wrap:wrap}
  .chip{border:1px solid var(--line);background:var(--card);color:var(--muted);
        padding:5px 13px;border-radius:18px;font-size:13px;cursor:pointer}
  .chip.active{background:var(--accent-d);color:#fff;border-color:var(--accent-d)}
  .progress{margin:14px 2px 0;font-size:12px;color:var(--muted)}
  .bar{height:8px;background:var(--mark);border-radius:6px;overflow:hidden;margin-top:5px}
  .bar>i{display:block;height:100%;background:linear-gradient(90deg,var(--accent),var(--ok));width:0}
  .search{width:100%;padding:11px 14px;margin:12px 0 4px;border:1px solid var(--line);
          border-radius:10px;font-size:15px;background:var(--card);color:var(--ink)}
  .count{color:var(--muted);font-size:12px;margin:6px 2px 12px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(96px,1fr));gap:10px}
  .cell{background:var(--card);border:1px solid var(--line);border-radius:12px;
        padding:12px 6px 10px;text-align:center;cursor:pointer;transition:.15s;position:relative}
  .cell:hover{transform:translateY(-2px);box-shadow:0 6px 16px rgba(110,95,174,.15);border-color:var(--accent)}
  .cell.learned{border-color:var(--ok)}
  .cell .k{font-size:34px;font-family:"Yu Mincho","Hiragino Mincho ProN",serif}
  .cell .m{font-size:11px;color:var(--muted);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .cell .lv{position:absolute;top:6px;left:7px;font-size:9px;color:var(--muted);opacity:.7}
  .cell .fav{position:absolute;top:3px;right:5px;font-size:14px;color:var(--line);cursor:pointer;line-height:1}
  .cell .fav.on{color:var(--gold)}
  .cell .chk{position:absolute;bottom:4px;right:6px;font-size:11px;color:var(--ok);opacity:0}
  .cell.learned .chk{opacity:1}
  .nav{display:flex;justify-content:space-between;align-items:center;margin:14px 0 2px}
  .nav a{color:var(--accent-d);cursor:pointer;font-size:14px;font-weight:600;user-select:none}
  .nav a.dim{opacity:.3;pointer-events:none}
  .title{font-size:25px;font-weight:800;margin:2px 0;text-align:center}
  .stroke{text-align:center;margin:8px 0}
  .stroke svg{width:170px;height:170px}
  .stroke svg path{stroke:var(--ink)!important;fill:none}
  .stroke svg text{display:none}
  .bigspk{border:none;background:var(--mark);border-radius:50%;width:96px;height:96px;font-size:44px;cursor:pointer;color:var(--ink)}
  .bigspk:active{background:var(--accent);color:#fff}
  .bigk{font-size:120px;line-height:1.05;text-align:center;font-family:"Yu Mincho","Hiragino Mincho ProN",serif;margin:6px 0}
  .meta{text-align:center;color:var(--muted);font-size:13px;margin-bottom:6px}
  .actions{display:flex;gap:8px;justify-content:center;margin:10px 0 4px;flex-wrap:wrap}
  .btn{border:1px solid var(--line);background:var(--card);border-radius:20px;padding:8px 15px;font-size:13px;cursor:pointer;color:var(--muted)}
  .btn.fav.on{background:#fef6e0;border-color:var(--gold);color:#9a7415}
  .btn.chk.on{background:#eafaef;border-color:var(--ok);color:#2e7d46}
  .sec{margin-top:30px}
  .sec h2{font-size:20px;color:var(--accent-d);margin:0;padding:6px 0 12px 14px;
          border-left:6px solid var(--accent);border-bottom:1px solid var(--line)}
  .sub{font-weight:700;color:var(--accent-d);font-size:15px;border-left:5px solid var(--accent);
       padding-left:10px;margin:20px 0 10px}
  .mark{background:var(--mark);padding:1px 7px;border-radius:5px;font-weight:700;margin-right:8px}
  ul{margin:10px 0;padding-left:20px}
  li{margin:6px 0}
  .ko{margin-left:6px}
  .note{color:var(--ink);opacity:.85}
  .jp{font-family:"Yu Mincho","Hiragino Mincho ProN",serif;font-size:19px}
  .wd{margin:9px 0}
  .conj{margin-top:4px;font-size:15px;color:var(--ink)}
  .conj .cl{display:inline-block;background:var(--accent);color:#fff;font-size:11px;font-weight:700;
        border-radius:6px;padding:1px 7px;margin-right:5px;font-family:"Apple SD Gothic Neo",sans-serif;vertical-align:2px}
  .spk{cursor:pointer;border:none;background:none;font-size:15px;opacity:.55;margin-left:4px}
  .spk:hover{opacity:1}
  .en{color:var(--muted);font-size:13px}
  .todo{color:var(--muted);font-size:13px;background:var(--mark);border:1px dashed var(--line);
        border-radius:8px;padding:10px 12px;margin-top:8px;opacity:.8}
  .tip{background:linear-gradient(135deg,#fff7e0,#fdeccb);border:1px solid #f0d089;
       border-radius:10px;padding:11px 14px;margin-top:12px;font-size:14px;color:#7a5a12}
  [data-theme="dark"] .tip{background:#3a3320;border-color:#6b5a2a;color:#e9d59b}
  .tip b{color:#b8860b}
  [data-theme="dark"] .tip b{color:#e8b53d}
  .quiz{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:28px 20px;margin-top:14px;text-align:center}
  .quiz .q{font-size:88px;font-family:"Yu Mincho",serif;margin:4px 0 14px}
  .quiz .q.qw{font-size:52px;line-height:1.2;word-break:keep-all}
  .quiz .prompt{color:var(--muted);font-size:14px;margin-bottom:14px}
  .opts{display:grid;gap:10px;max-width:440px;margin:0 auto}
  .opt{padding:13px;border:1px solid var(--line);border-radius:10px;background:var(--bg);color:var(--ink);cursor:pointer;font-size:15px}
  .opt:hover{border-color:var(--accent)}
  .opt.ok{background:#e3f5e8;border-color:var(--ok);color:#1c1c1c}
  .opt.no{background:#fbe6e6;border-color:#d97a7a;color:#1c1c1c}
  .score{margin-top:14px;color:var(--muted);font-size:13px}
  /* 플래시카드 */
  .fc{perspective:1200px;max-width:420px;margin:8px auto 0}
  .fcard{position:relative;height:330px;cursor:pointer;transition:transform .5s;transform-style:preserve-3d}
  .fcard.flip{transform:rotateY(180deg)}
  .face{position:absolute;inset:0;backface-visibility:hidden;background:var(--card);border:1px solid var(--line);
        border-radius:18px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;text-align:center}
  .face.b{transform:rotateY(180deg)}
  .face .big{font-size:130px;font-family:"Yu Mincho",serif;line-height:1}
  .face .bk{font-family:"Yu Mincho",serif;font-size:44px;opacity:.22;line-height:1;margin-bottom:2px}
  .face .ko{font-size:26px;font-weight:800;margin:0 0 12px}
  .rdg{font-family:"Yu Mincho","Hiragino Mincho ProN",serif;font-size:21px;margin:7px 0;line-height:1.5}
  .rl{font-family:"Apple SD Gothic Neo",sans-serif;font-size:12px;font-weight:700;color:#fff;border-radius:6px;padding:2px 9px;vertical-align:3px}
  .rl.on{background:var(--accent)}
  .rl.kun{background:var(--ok)}
  .rv{font-size:21px}
  .fc .hint{color:var(--muted);font-size:12px;margin-top:10px;text-align:center}
  .fcbtns{display:flex;gap:12px;max-width:420px;margin:14px auto 0}
  .fcbtns button{flex:1;padding:14px;border-radius:12px;border:1px solid var(--line);font-size:15px;cursor:pointer;background:var(--card);color:var(--ink)}
  .fcbtns .know{border-color:var(--ok);color:#2e7d46}
  .fcbtns .dunno{border-color:#d99;color:#b35}
  .empty{color:var(--muted);text-align:center;padding:30px}
  .hide{display:none}
  #theme{margin-left:auto}
  #vtitle{color:var(--muted);font-weight:600}
  .menu{position:absolute;top:52px;left:14px;background:var(--card);border:1px solid var(--line);
        border-radius:12px;box-shadow:0 8px 28px rgba(0,0,0,.18);padding:6px;z-index:30;min-width:170px}
  .menu .mi{display:block;width:100%;text-align:left;border:none;background:none;color:var(--ink);
        font-size:15px;padding:11px 14px;border-radius:8px;cursor:pointer}
  .menu .mi:hover{background:var(--mark)}
  .setup{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:22px 18px;margin-top:16px;text-align:center}
  .setup-h{font-size:19px;margin:0 0 12px;color:var(--accent-d)}
  .slabel{font-size:12px;color:var(--muted);margin:15px 0 5px}
  .savail{color:var(--muted);font-size:13px;margin:16px 0 18px}
  .startbtn{background:var(--accent);color:#fff;border:none;border-radius:24px;padding:13px 30px;
        font-size:16px;font-weight:700;cursor:pointer}
  .startbtn:disabled{opacity:.4;cursor:default}
  .snav{display:flex;justify-content:space-between;align-items:center;margin:14px 0 6px}
  .navb{border:1px solid var(--line);background:var(--card);color:var(--accent-d);border-radius:20px;
        padding:7px 15px;font-size:14px;font-weight:600;cursor:pointer}
  .navb:disabled{opacity:.3;cursor:default}
  .snum{color:var(--muted);font-size:13px}
  .result-score{font-size:36px;font-weight:800;margin:8px 0 4px}
  .result-score span{font-size:18px;color:var(--muted);font-weight:600}
  .wronglist{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin:12px 0 18px}
  .wq{font-family:"Yu Mincho",serif;font-size:24px;background:var(--mark);border-radius:8px;padding:4px 11px;cursor:pointer}
  .stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:8px}
  .stat{background:var(--bg);border:1px solid var(--line);border-radius:12px;padding:14px 6px}
  .stat .sv{font-size:24px;font-weight:800;color:var(--accent-d)}
  .stat .sl{font-size:11px;color:var(--muted);margin-top:3px}
  .voclist{list-style:none;padding:0;margin:10px 0}
  .voclist li{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:10px 34px 10px 12px;margin:7px 0;cursor:pointer;position:relative}
  .voclist li:hover{border-color:var(--accent)}
  .voclist li .wd{margin:0}
  .vlv{position:absolute;top:8px;right:10px;font-size:10px;color:var(--muted)}
</style>
</head>
<body>
<header><div class="inner">
  <button class="ic" id="menuBtn" title="메뉴" aria-label="메뉴">☰</button>
  <h1>🇯🇵 한자 공부<span id="vtitle"></span></h1>
  <button class="ic" id="theme" title="다크 모드">🌙</button>
  <div class="menu hide" id="menu">
    <button class="mi" data-view="list">📋 목록</button>
    <button class="mi" data-view="card">🃏 카드 학습</button>
    <button class="mi" data-view="quiz">❓ 퀴즈</button>
    <button class="mi" data-view="vocab">📖 단어장</button>
    <button class="mi" data-view="stats">📊 통계 · 백업</button>
  </div>
</div></header>

<div class="wrap">
  <div id="view-list">
    <div class="filters" id="lvFilters"></div>
    <div class="filters" id="stFilters"></div>
    <div class="progress" id="progress"></div>
    <input class="search" id="search" placeholder="한자 · 뜻 · 읽기 검색 (예: 日, 날, にち, day)">
    <div class="count" id="count"></div>
    <div class="grid" id="grid"></div>
  </div>
  <div id="view-detail" class="hide"></div>
  <div id="view-card" class="hide"></div>
  <div id="view-quiz" class="hide"></div>
  <div id="view-vocab" class="hide"></div>
  <div id="view-stats" class="hide"></div>
</div>

<script>
/*__DATA__*/
const $=s=>document.querySelector(s);
const LEVELS=[["ALL","전체"],["N5","N5"],["N4","N4"],["N3","N3"]];
const STS=[["all","모두"],["fav","즐겨찾기 ★"],["unlearned","미암기"],["wrong","오답 ✗"]];
let curLevel="ALL", stMode="all";

/* 저장 */
const store={get(k){try{return new Set(JSON.parse(localStorage.getItem(k)||"[]"))}catch(e){return new Set()}},
  set(k,s){localStorage.setItem(k,JSON.stringify([...s]))}};
let FAV=store.get("kanji_fav"), LEARNED=store.get("kanji_learned"), WRONG=store.get("kanji_wrong");
function setWrong(ch,v){v?WRONG.add(ch):WRONG.delete(ch);store.set("kanji_wrong",WRONG);}
function toggleSet(set,key,ch){set.has(ch)?set.delete(ch):set.add(ch);store.set(key,set);}
function setLearned(ch,v){v?LEARNED.add(ch):LEARNED.delete(ch);store.set("kanji_learned",LEARNED);}

/* 다크모드 */
if(localStorage.getItem("kanji_theme")==="dark")document.documentElement.dataset.theme="dark";
$("#theme").onclick=()=>{const d=document.documentElement.dataset.theme==="dark";
  document.documentElement.dataset.theme=d?"":"dark";localStorage.setItem("kanji_theme",d?"light":"dark");
  $("#theme").textContent=d?"🌙":"☀️";};
$("#theme").textContent=document.documentElement.dataset.theme==="dark"?"☀️":"🌙";

/* TTS */
function speak(t){try{speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(t);u.lang="ja-JP";u.rate=.9;speechSynthesis.speak(u);}catch(e){}}

/* helpers */
function ruby(b,r){return (r&&r!==b)?`<ruby>${b}<rt>${r}</rt></ruby>`:b;}
function wordHTML(w){
  const surface=w[0]+w[2],vf=verbForms(surface,k2h(w[1])+k2h(w[3]));
  const conj=vf?`<div class="conj"><span class="cl">て</span>${vf.te}　<span class="cl">た</span>${vf.ta}</div>`:"";
  return `<div class="wd"><span class="jp">${ruby(w[0],k2h(w[1]))}${ruby(w[2],k2h(w[3]))}</span> <span class="ko">${w[4]}</span>${conj}</div>`;}
/* 음독 가타카나 → 히라가나 표시용 변환 */
function k2h(s){return (s||"").replace(/[ァ-ヶ]/g,function(c){return String.fromCharCode(c.charCodeAt(0)-0x60);});}
function onJoin(k){return k.on.map(k2h).join("、")||"—";}
function readSpeak(r){return k2h(r).replace(/\./g,"");}  /* 점(오쿠리가나 구분) 제거 → 전체 읽기 */
/* 훈독을 한자+후리가나 형태로: "い.る"→入(い)る, "ひ"→日(ひ) */
function kunForm(ch,r){const i=r.indexOf(".");
  if(i<0)return ruby(ch,k2h(r));
  return ruby(ch,k2h(r.slice(0,i)))+r.slice(i+1);}
function kunJoin(k){return k.kun.length?k.kun.map(r=>kunForm(k.char,r)).join("、"):"—";}
function kunJoinCard(k){if(!k.kun.length)return "—";const a=k.kun.slice(0,3).map(r=>kunForm(k.char,r));if(k.kun.length>3)a.push("…");return a.join("、");}
/* 동사 활용: 표제(surface)가 う단 히라가나 오쿠리가나로 끝나면 동사로 보고 て형/た형 생성 */
const URO=/[うくぐすつぬぶむる]/;
const IEROW=/[いきしちにひみりゐぎじぢびぴえけせてねへめれゑげぜでべぺ]/;  /* い·え단(1단 판정) */
const GODAN_EXC=new Set(["かえる","はいる","はしる","しる","きる","いる","へる","しゃべる","ける","まいる","かぎる","にぎる","すべる","ちる","てる","あせる","ねじる"]);
function isHira(c){return c>="ぁ"&&c<="ゖ";}
function verbForms(surface,reading){
  const lc=surface[surface.length-1];
  if(!surface.endsWith("する")&&!(isHira(lc)&&URO.test(lc)))return null;  /* 동사 신호 없음 */
  if(reading.length>=2&&reading.endsWith("する"))return {te:surface.slice(0,-2)+"して",ta:surface.slice(0,-2)+"した"};
  if(reading==="くる")return {te:surface.slice(0,-1)+"て",ta:surface.slice(0,-1)+"た"};  /* 来る→来て */
  const last=reading[reading.length-1];
  if(!URO.test(last))return null;
  let drop=1,teSuf,taSuf;
  if(last==="る"&&IEROW.test(reading[reading.length-2]||"")&&!GODAN_EXC.has(reading)){teSuf="て";taSuf="た";}  /* 1단 */
  else if(reading==="いく"){teSuf="って";taSuf="った";}  /* 行く 예외 */
  else if("うつる".indexOf(last)>=0){teSuf="って";taSuf="った";}
  else if("ぬぶむ".indexOf(last)>=0){teSuf="んで";taSuf="んだ";}
  else if(last==="く"){teSuf="いて";taSuf="いた";}
  else if(last==="ぐ"){teSuf="いで";taSuf="いだ";}
  else if(last==="す"){teSuf="して";taSuf="した";}
  else return null;
  return {te:surface.slice(0,surface.length-drop)+teSuf,ta:surface.slice(0,surface.length-drop)+taSuf};
}
function shortMeaning(k){return k.ko||(k.en[0]||"");}
function hex(ch){return ch.codePointAt(0).toString(16).padStart(5,"0");}
function inLevel(k){return curLevel==="ALL"||k.level===curLevel;}
function stOK(k){return stMode==="all"||(stMode==="fav"&&FAV.has(k.char))||(stMode==="unlearned"&&!LEARNED.has(k.char))||(stMode==="wrong"&&WRONG.has(k.char));}

/* 필터 UI */
$("#lvFilters").innerHTML=LEVELS.map(([v,l])=>`<button class="chip ${v==='ALL'?'active':''}" data-lv="${v}">${l}</button>`).join("");
$("#stFilters").innerHTML=STS.map(([v,l])=>`<button class="chip ${v==='all'?'active':''}" data-st="${v}">${l}</button>`).join("");
document.querySelectorAll("[data-lv]").forEach(c=>c.onclick=()=>{curLevel=c.dataset.lv;
  document.querySelectorAll("[data-lv]").forEach(x=>x.classList.toggle("active",x===c));renderList($("#search").value);});
document.querySelectorAll("[data-st]").forEach(c=>c.onclick=()=>{stMode=c.dataset.st;
  document.querySelectorAll("[data-st]").forEach(x=>x.classList.toggle("active",x===c));renderList($("#search").value);});

/* 목록 */
let curView=[];
function filtered(f){f=f.trim().toLowerCase();
  return KANJI.filter(k=>inLevel(k)&&stOK(k)&&(!f||k.char.includes(f)||k.ko.toLowerCase().includes(f)
    ||(k.on.join("")+k.on.map(k2h).join("")).toLowerCase().includes(f)||k.kun.join("").toLowerCase().includes(f)||k.en.join(" ").toLowerCase().includes(f)));}
function updateProgress(){const pool=KANJI.filter(inLevel);const done=pool.filter(k=>LEARNED.has(k.char)).length;
  const pct=pool.length?Math.round(done/pool.length*100):0;
  $("#progress").innerHTML=`암기 진도 (${curLevel==="ALL"?"전체":curLevel}) · ${done} / ${pool.length} (${pct}%)<div class="bar"><i style="width:${pct}%"></i></div>`;}
function renderList(f=""){const list=filtered(f);curView=list;updateProgress();$("#count").textContent=`${list.length}자`;
  $("#grid").innerHTML=list.length?list.map(k=>`
    <div class="cell ${LEARNED.has(k.char)?'learned':''}" onclick="showDetail('${k.char}')">
      <span class="lv">${k.level}</span>
      <span class="fav ${FAV.has(k.char)?'on':''}" onclick="event.stopPropagation();favCell('${k.char}',this)">★</span>

function loadStroke(char){fetch(`https://cdn.jsdelivr.net/gh/KanjiVG/kanjivg@master/kanji/${hex(char)}.svg`)

function animateStroke(){const svg=document.querySelector("#stroke svg");if(!svg)return;
  const paths=[...svg.querySelectorAll("path")];let delay=0;
  paths.forEach(p=>{let len;try{len=p.getTotalLength();}catch(e){len=120;}
    p.style.transition="none";p.style.strokeDasharray=len;p.style.strokeDashoffset=len;
    p.getBoundingClientRect();
    const dur=Math.max(.25,Math.min(1.1,len/130));
    p.style.transition=`stroke-dashoffset ${dur}s linear ${delay}s`;p.style.strokeDashoffset=0;delay+=dur;});}

const COUNTS=[[10,"10개"],[20,"20개"],[30,"30개"],[0,"전체"]];

function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function chipRow(items,cur,fn){return `<div class="filters" style="justify-content:center">${items.map(([v,l])=>`<button class="chip ${v===cur?'active':''}" onclick="${fn}('${v}')">${l}</button>`).join("")}</div>`;}

let cardDeck=[],cardIdx=0,cardFlip=false;
function startCardSession(){let pool=shuffle(KANJI.filter(k=>inLevel(k)&&stOK(k)).slice());

/* 퀴즈 */
let quizType="kanji";
const QTYPES=[["kanji","한자"],["word","단어"],["listen","듣기 🔊"]];
function quizPool(){return KANJI.filter(k=>inLevel(k)&&stOK(k));}
/* 현재 필터의 한자들에서 대표단어를 모아 단어 풀 생성 */
function wordPool(){const seen={},out=[];
  quizPool().forEach(k=>(k.onWords||[]).concat(k.kunWords||[]).forEach(g=>(g.words||[]).forEach(w=>{
    const word=w[0]+w[2],read=k2h(w[1])+k2h(w[3]),ko=w[4],key=word+"|"+read;
    if(!seen[key]){seen[key]=1;out.push({word:word,read:read,ko:ko});}})));
  return out;}
let quizItems=[],quizIdx=0;
function startQuizSession(){
  quizItems=[];
  if(quizType==="word"){
    let pool=shuffle(wordPool().slice());if(pool.length<4){openSetup("quiz");return;}
    const take=sessCount>0?Math.min(sessCount,pool.length):pool.length;
    for(let i=0;i<take;i++){const c=pool[i],ask=Math.random()<0.5;
      const others=shuffle(pool.filter(w=>w.ko!==c.ko&&w.read!==c.read).slice()).slice(0,3);
      const opts=shuffle([c,...others].map(o=>({correct:o===c,label:ask?o.ko:`<span class="jp">${o.read}</span>`})));
      quizItems.push({kind:"word",word:c.word,read:c.read,ask:ask,opts:opts,answered:null});}
  }else if(quizType==="listen"){
    let pool=shuffle(KANJI.filter(k=>inLevel(k)&&stOK(k)&&(k.on.length||k.kun.length)).slice());if(pool.length<4){openSetup("quiz");return;}
    const take=sessCount>0?Math.min(sessCount,pool.length):pool.length;
    for(let i=0;i<take;i++){const c=pool[i];
      const say=c.on.length?k2h(c.on[0]):readSpeak(c.kun[0]);
      const others=shuffle(KANJI.filter(k=>k!==c).slice()).slice(0,3);
      const opts=shuffle([c,...others].map(o=>({correct:o===c,label:`<span class="jp" style="font-size:30px">${o.char}</span>`})));
      quizItems.push({kind:"listen",char:c.char,say:say,opts:opts,answered:null});}
  }else{
    let pool=shuffle(KANJI.filter(k=>inLevel(k)&&stOK(k)).slice());if(pool.length<1){openSetup("quiz");return;}
    const take=sessCount>0?Math.min(sessCount,pool.length):pool.length;
    for(let i=0;i<take;i++){const c=pool[i],ask=Math.random()<0.5;
      const others=shuffle(KANJI.filter(k=>k!==c).slice()).slice(0,3);
      const opts=shuffle([c,...others].map(o=>({correct:o===c,label:ask?shortMeaning(o):`<span class="jp">${o.on.map(k2h).concat(o.kun).join("、")||"—"}</span>`})));
      quizItems.push({kind:"kanji",char:c.char,ask:ask,opts:opts,answered:null});}
  }
  quizIdx=0;renderQuiz();
}
function quizCorrect(){return quizItems.filter(it=>it.answered!=null&&it.opts[it.answered].correct).length;}
function renderQuiz(){
  if(quizIdx>=quizItems.length)return renderQuizResult();
  const it=quizItems[quizIdx],done=it.answered!=null;
  const prompt=it.kind==="word"?(it.ask?"이 단어의 뜻은?":"이 단어의 읽기는?")
    :it.kind==="listen"?"🔊 들리는 읽기의 한자는?":(it.ask?"이 한자의 뜻은?":"이 한자의 읽기는?");
  const say=it.kind==="word"?it.read:it.kind==="listen"?it.say:it.char;
  const q=it.kind==="word"?`<div class="q qw">${it.word}</div>`
    :it.kind==="listen"?`<div class="q"><button class="bigspk" onclick="speak('${say}')">🔊</button></div>`
    :`<div class="q">${it.char}</div>`;
  const spkBtn=it.kind==="listen"?"":` <button class="spk" onclick="speak('${say}')">🔊</button>`;
  $("#view-quiz").innerHTML=`
    <div class="snav"><button class="navb" ${quizIdx?'':'disabled'} onclick="quizGo(-1)">◀ 이전</button>
      <span class="snum">${quizIdx+1} / ${quizItems.length}</span>
      <button class="navb" onclick="quizGo(1)">${quizIdx===quizItems.length-1?'결과 ▶':'다음 ▶'}</button></div>
    <div class="quiz"><div class="prompt">${prompt}${spkBtn}</div>${q}
      <div class="opts">${it.opts.map((o,i)=>{let cls="opt";if(done){if(o.correct)cls+=" ok";else if(i===it.answered)cls+=" no";}
        return `<div class="${cls}" ${done?"":`onclick="quizAnswer(${i})"`}>${o.label}</div>`;}).join("")}</div>
      <div class="score">${done?(it.opts[it.answered].correct?"⭕ 정답":"❌ 오답"):"정답을 고르세요"} · 맞힘 ${quizCorrect()} / ${quizItems.length}</div></div>`;
  if(it.kind==="listen"&&!done)setTimeout(()=>speak(say),250);
}
function quizAnswer(i){const it=quizItems[quizIdx];if(it.answered!=null)return;it.answered=i;
  const ok=it.opts[i].correct;recordQuiz(ok);
  if(it.char)setWrong(it.char,!ok);  /* 오답 노트(한자·듣기) */
  renderQuiz();}
function quizGo(d){quizIdx=Math.max(0,quizIdx+d);renderQuiz();}
function renderQuizResult(){
  const total=quizItems.length,correct=quizCorrect(),pct=total?Math.round(correct/total*100):0;
  const wrong=quizItems.filter(it=>it.answered==null||!it.opts[it.answered].correct);
  $("#view-quiz").innerHTML=`<div class="setup"><h2 class="setup-h">결과</h2>
    <p class="result-score">${correct} / ${total} <span>(${pct}%)</span></p>
    ${wrong.length?`<div class="slabel">틀린·안 푼 문제 ${wrong.length}개</div><div class="wronglist">${wrong.map(it=>`<span class="wq">${it.kind==="word"?it.word:it.char}</span>`).join("")}</div>`:`<p class="savail">전부 맞혔어요! 🎉</p>`}
    <button class="startbtn" onclick="startQuizSession()">한 번 더</button>
    <div style="margin-top:12px"><button class="navb" onclick="openSetup('quiz')">설정 바꾸기</button></div></div>`;
}

/* 통계 (localStorage 기록) */
function todayKey(d){d=d||new Date();return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");}
function loadStats(){let s;try{s=JSON.parse(localStorage.getItem("kanji_stats"));}catch(e){}
  if(!s||typeof s!=="object")s={};s.days=s.days||{};s.streak=s.streak||0;s.totalQuizQ=s.totalQuizQ||0;s.totalQuizCorrect=s.totalQuizCorrect||0;return s;}
function saveStats(s){localStorage.setItem("kanji_stats",JSON.stringify(s));}
function bumpStreak(s){const t=todayKey();if(s.lastDate===t)return;const y=new Date();y.setDate(y.getDate()-1);
  s.streak=(s.lastDate===todayKey(y))?s.streak+1:1;s.lastDate=t;}
function dayRec(s){const t=todayKey();s.days[t]=s.days[t]||{studied:0,quizQ:0,quizCorrect:0};return s.days[t];}
function recordStudy(n){const s=loadStats();bumpStreak(s);dayRec(s).studied+=n||1;saveStats(s);}
function recordQuiz(ok){const s=loadStats();bumpStreak(s);const d=dayRec(s);d.quizQ++;if(ok)d.quizCorrect++;
  s.totalQuizQ++;if(ok)s.totalQuizCorrect++;saveStats(s);}
function statsScreen(){
  const s=loadStats(),acc=s.totalQuizQ?Math.round(s.totalQuizCorrect/s.totalQuizQ*100):0;

      ${stat(acc+"%","퀴즈 정답률")}${stat(WRONG.size,"복습 필요(오답)")}${stat(s.totalQuizQ,"총 푼 문제")}

  </div>`;

/* 진도 백업: 내보내기 / 가져오기 */
const BK_KEYS=["kanji_fav","kanji_learned","kanji_wrong","kanji_stats","kanji_theme"];
function exportData(){const data={};BK_KEYS.forEach(k=>{const v=localStorage.getItem(k);if(v!=null)data[k]=v;});
  const blob=new Blob([JSON.stringify({app:"kanji-jlpt-study",exported:new Date().toISOString(),data:data},null,2)],{type:"application/json"});
  const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="kanji-progress-"+todayKey()+".json";
  document.body.appendChild(a);a.click();a.remove();setTimeout(()=>URL.revokeObjectURL(a.href),1000);}
function importData(file){const r=new FileReader();
  r.onload=()=>{try{const j=JSON.parse(r.result),d=j.data||j;let n=0;
    Object.keys(d).forEach(k=>{if(k.indexOf("kanji_")===0){localStorage.setItem(k,d[k]);n++;}});
    if(!n)throw 0;alert("가져오기 완료! 앱을 새로고침합니다.");location.reload();}
    catch(e){alert("가져오기 실패: 올바른 백업 파일이 아닙니다.");}};
  r.readAsText(file);}

let allWords=null,vocabLevel="ALL",vocabQ="";
function buildWords(){if(allWords)return allWords;const seen={},out=[];
  KANJI.forEach(k=>(k.onWords||[]).concat(k.kunWords||[]).forEach(g=>(g.words||[]).forEach(w=>{
    const word=w[0]+w[2],read=k2h(w[1])+k2h(w[3]),key=word+"|"+read;
    if(!seen[key]){seen[key]=1;out.push({word:word,read:read,ko:w[4],level:k.level,kanji:k.char,html:wordHTML(w)});}})));
  allWords=out;return out;}
function vocabFilter(){const f=vocabQ.trim().toLowerCase();
  return buildWords().filter(w=>(vocabLevel==="ALL"||w.level===vocabLevel)&&(!f||w.word.includes(f)||w.read.includes(f)||w.ko.toLowerCase().includes(f)));}
function renderVocabList(){const list=vocabFilter();
  $("#voclistwrap").innerHTML=`<div class="count">${list.length}개 단어</div>
    <ul class="voclist">${list.slice(0,400).map(w=>`<li onclick="showDetail('${w.kanji}')">${w.html}<span class="vlv">${w.level}</span></li>`).join("")||'<p class="empty">결과가 없습니다.</p>'}</ul>
    ${list.length>400?'<p class="count">상위 400개만 표시 — 검색으로 좁혀보세요</p>':''}`;}
function vocabScreen(){
  $("#view-vocab").innerHTML=`${chipRow(LEVELS,vocabLevel,'setVocabLevel')}
    <input class="search" id="vsearch" placeholder="단어 · 읽기 · 뜻 검색" value="${vocabQ.replace(/"/g,'&quot;')}">
    <div id="voclistwrap"></div>`;
  $("#vsearch").addEventListener("input",e=>{vocabQ=e.target.value;renderVocabList();});
  renderVocabList();}
function setVocabLevel(v){vocabLevel=v;vocabScreen();}
